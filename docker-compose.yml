version: '3.8'

services:
  star-office-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: star-office-ui
    ports:
      - "5000:5000"
    environment:
      - DATABASE_PATH=/data/github-collab.db
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=5000
    volumes:
      # 数据持久化
      - star-office-data:/data
      # 开发环境热重载挂载
      - /home/wljmmx/star-office-ui/backend:/app/backend
      - /home/wljmmx/star-office-ui/frontend:/app/frontend
      - /home/wljmmx/.openclaw/skills/github-collab:/app/skills/github-collab
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 可选：Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: star-office-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - star-office-ui
    restart: unless-stopped

volumes:
  star-office-data:
